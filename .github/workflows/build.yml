name: Auto Build Hosts

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  DNS_LIST: "223.5.5.5 114.114.114.114"
  DIG_TIMEOUT: 2
  RETRY_TIMES: 2                     # 现在真正启用重试

jobs:
  make-hosts:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          clean: false               # 避免内置 post-checkout 全量扫描

      - name: 安装依赖
        run: |
          sudo apt update -qq
          sudo apt install -y -qq dnsutils moreutils
          # 不再修改系统 DNS 或进程限制，避免干扰 Runner

      - name: 并行解析并生成 hosts
        run: |
          set -euo pipefail

          # 清理临时文件（无需杀进程）
          cleanup() { rm -f resolve_result.tmp domain.clean; }
          trap cleanup EXIT

          # 写入头部
          cat > hosts <<EOF
          # AutoHosts GitHub+Unraid+Docker+TMDB/TVDB 加速
          # 更新时间 (北京时间): $(date +'%Y-%m-%d %H:%M:%S')
          # 定时周期: 每4小时自动更新
          # IPv6 条目末尾标记 # IPv6
          EOF

          # 清洗域名列表（去重、过滤空行/注释），但不覆盖原文件
          grep -v '^\s*$' domain.list | grep -v '^\s*#' | sort -u > domain.clean

          # 单域名解析函数（带重试）
          resolve_single() {
            local dom="$1"
            local ipv4="" ipv6=""
            for dns in $DNS_LIST; do
              for ((i=1; i<=RETRY_TIMES; i++)); do
                ipv4=$(dig +short +timeout=$DIG_TIMEOUT @"$dns" A "$dom" 2>/dev/null | grep -E '^[0-9.]+$' | head -1)
                ipv6=$(dig +short +timeout=$DIG_TIMEOUT @"$dns" AAAA "$dom" 2>/dev/null | grep -E '^[0-9a-fA-F:]+$' | head -1)
                [[ -n "$ipv4" || -n "$ipv6" ]] && break 2
              done
            done
            echo "$dom||$ipv4||$ipv6"
          }
          export -f resolve_single
          export DNS_LIST DIG_TIMEOUT RETRY_TIMES

          # 8 线程并行解析
          < domain.clean xargs -P8 -I{} bash -c 'resolve_single "{}"' > resolve_result.tmp

          # 分类存储（使用关联数组）
          declare -A groups=([github]="" [unraid]="" [media]="")
          fail_count=0

          while IFS='||' read -r dom ipv4 ipv6; do
            if [[ -z "$ipv4" && -z "$ipv6" ]]; then
              echo "⚠️ 解析失败：$dom"
              fail_count=$((fail_count + 1))
              continue
            fi
            echo "✅ 解析成功 | $dom | IPv4:$ipv4 | IPv6:$ipv6"

            # 组装行（IPv4 和 IPv6 分别存储）
            [[ -n "$ipv4" ]] && line4="$ipv4 $dom"
            [[ -n "$ipv6" ]] && line6="$ipv6 $dom # IPv6"

            case "$dom" in
              *github*|*githubusercontent*)
                [[ -n "$ipv4" ]] && groups[github]+="${line4}"$'\n'
                [[ -n "$ipv6" ]] && groups[github]+="${line6}"$'\n'
                ;;
              *unraid*)
                [[ -n "$ipv4" ]] && groups[unraid]+="${line4}"$'\n'
                [[ -n "$ipv6" ]] && groups[unraid]+="${line6}"$'\n'
                ;;
              *)
                [[ -n "$ipv4" ]] && groups[media]+="${line4}"$'\n'
                [[ -n "$ipv6" ]] && groups[media]+="${line6}"$'\n'
                ;;
            esac
          done < resolve_result.tmp

          # 分区块写入 hosts
          for tag in "github#GitHub" "unraid#Unraid" "media#Docker/MediaScraper"; do
            key="${tag%#*}" ; label="${tag#*#}"
            echo -e "\n## ===== $label 加速域名 =====" >> hosts
            while IFS= read -r line; do
              [[ -n "$line" ]] && printf "%-40s %s\n" "$line" "#$label" >> hosts
            done <<< "${groups[$key]}"
          done

          echo -e "\n# 文件结束" >> hosts

          # 输出统计
          echo -e "\n==================== 运行统计 ===================="
          echo "GitHub 条目：$(echo "${groups[github]}" | wc -l)"
          echo "Unraid 条目：$(echo "${groups[unraid]}" | wc -l)"
          echo "Docker/媒体 条目：$(echo "${groups[media]}" | wc -l)"
          echo "解析失败域名：$fail_count"
          echo "=================================================="

      - name: 提交并推送（使用 GITHUB_TOKEN 规避 DNS 污染）
        run: |
          git config user.name "tee1975"
          git config user.email "tee1975@users.noreply.github.com"
          git add hosts
          if git diff --staged --quiet; then
            echo "hosts 无变化，跳过提交"
            exit 0
          fi
          git commit -m "auto update hosts $(date +'%Y-%m-%d %H:%M')"

          # 关键改进：使用 GitHub Token 认证，不再依赖 DNS 解析 GitHub IP
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git pull --rebase --autostash origin main
          git push origin main

      - name: 手动轻量清理（替代内置 post-checkout 扫描）
        run: |
          git submodule deinit --all 2>/dev/null || true
          rm -rf .git/modules .git/submodule-cache 2>/dev/null || true
          git config --global --remove-section submodule 2>/dev/null || true
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          git clean -fd --exclude=hosts --exclude=domain.list 2>/dev/null || true
