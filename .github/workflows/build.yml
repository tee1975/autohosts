name: Auto Build Hosts
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  DNS_LIST: "114.114.114.114 223.5.5.5 1.1.1.1"
  DIG_TIMEOUT: 1
  RETRY_TIMES: 1

jobs:
  make-hosts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: 安装解析工具 & 系统DNS优化
        run: |
          sudo apt update -qq
          sudo apt install -y -qq dnsutils coreutils moreutils
          echo "options timeout:1 attempts:1" | sudo tee /etc/resolv.conf

      - name: 批量解析生成Hosts
        run: |
          # 初始化hosts头部
          echo "# AutoHosts GitHub+Unraid+Docker 加速文件" > hosts
          echo "# 更新时间(北京时间): $(date +'%Y-%m-%d %H:%M:%S')" >> hosts
          echo "# 定时周期: 每2小时UTC自动更新" >> hosts
          echo "# IPv6条目标记 # IPv6" >> hosts

          # 域名去重清理
          sort -u domain.list | grep -v '^\s*$' > domain.tmp && mv domain.tmp domain.list

          # 带双层超时保护的解析函数，杜绝单域名卡死runner
          resolve_both_ip() {
            local dom="$1"
            local ipv4=""
            local ipv6=""
            for dns in $DNS_LIST; do
              ipv4=$(timeout 2 dig +short +timeout=$DIG_TIMEOUT @"$dns" A "$dom" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              ipv6=$(timeout 2 dig +short +timeout=$DIG_TIMEOUT @"$dns" AAAA "$dom" | grep -E '^[0-9a-fA-F:]+$' | head -1)
              [[ -n "$ipv4" || -n "$ipv6" ]] && break
              sleep 0.2
            done
            echo "${ipv4}||${ipv6}"
          }

          # 分类数组初始化
          github_domains=()
          unraid_domains=()
          docker_domains=()
          fail_count=0

          # 遍历全部域名自动分类
          while read -r raw_dom; do
            [[ "$raw_dom" =~ ^\s*# || -z "$raw_dom" ]] && continue
            dom=$(echo "$raw_dom" | xargs)
            result=$(resolve_both_ip "$dom")
            ipv4="${result%%||*}"
            ipv6="${result##*||}"

            if [[ -z "$ipv4" && -z "$ipv6" ]]; then
              echo "⚠️ 解析失败：$dom"
              fail_count=$((fail_count + 1))
              continue
            fi
            echo "✅解析成功 | $dom | IPv4:$ipv4 | IPv6:$ipv6"

            # 自动归类
            if [[ "$dom" =~ github|githubusercontent ]]; then
              [[ -n "$ipv4" ]] && github_domains+=("${ipv4} ${dom}")
              [[ -n "$ipv6" ]] && github_domains+=("${ipv6} ${dom} # IPv6")
            elif [[ "$dom" =~ unraid ]]; then
              [[ -n "$ipv4" ]] && unraid_domains+=("${ipv4} ${dom}")
              [[ -n "$ipv6" ]] && unraid_domains+=("${ipv6} ${dom} # IPv6")
            elif [[ "$dom" =~ docker|linuxserver|amazonaws ]]; then
              [[ -n "$ipv4" ]] && docker_domains+=("${ipv4} ${dom}")
              [[ -n "$ipv6" ]] && docker_domains+=("${ipv6} ${dom} # IPv6")
            fi
          done < domain.list

          # 分区块写入hosts文件
          echo -e "\n## ===== GitHub 加速域名 =====" >> hosts
          for line in "${github_domains[@]}"; do
            printf "%-30s #GitHub\n" $line >> hosts
          done

          echo -e "\n## ===== Unraid 商店/插件域名 =====" >> hosts
          for line in "${unraid_domains[@]}"; do
            printf "%-30s #Unraid\n" $line >> hosts
          done

          echo -e "\n## ===== Docker & LinuxServer 域名 =====" >> hosts
          for line in "${docker_domains[@]}"; do
            printf "%-30s #Docker\n" $line >> hosts
          done
          echo -e "\n# 文件结束" >> hosts

          # 输出本次运行统计
          echo -e "\n==================== 运行统计 ===================="
          echo "GitHub成功条目：${#github_domains[@]}"
          echo "Unraid成功条目：${#unraid_domains[@]}"
          echo "Docker成功条目：${#docker_domains[@]}"
          echo "本次解析失败域名：$fail_count"
          echo "=================================================="

      - name: 提交&推送（修复github域名解析失败）
        run: |
          git config user.name "tee1975"
          git config user.email "tee1975@users.noreply.github.com"
          git add hosts
          # 无变更直接退出
          if git diff --staged --quiet; then
            echo "hosts无更新，跳过提交推送"
            exit 0
          fi
          git commit -m "auto update hosts $(date +'%Y-%m-%d %H:%M')"
          rm -f domain.tmp

          # 强制写入github稳定IP，绕开DNS污染，解决git无法解析github.com
          echo "140.82.116.4 github.com" | sudo tee -a /etc/hosts
          echo "185.199.108.133 raw.githubusercontent.com" | sudo tee -a /etc/hosts

          git pull --rebase --autostash origin main
          git push origin main
