name: Auto Build Hosts
on:
  schedule:
    - cron: "0 */2 * * *"  # 每2小时自动更新一次
  workflow_dispatch:  # 支持手动触发更新

jobs:
  make-hosts:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装解析工具
        run: sudo apt update && sudo apt install -y dnsutils

      - name: 生成hosts文件
        run: |
          echo "# AutoHosts Start" > hosts
          export TZ="Asia/Shanghai"
          echo "# Build Time: $(date +'%Y-%m-%d %H:%M:%S')" >> hosts
          echo "# Auto update every 2 hours" >> hosts
          echo "" >> hosts

          # 自动解析所有域名的IP并写入hosts
          while read dom; do
            ip=$(dig +short $dom | grep -E '^[0-9.]+$' | head -1)
            if [ -n "$ip" ]; then
              printf "%-25s %s %s\n" "$ip" "$dom" "# Auto generated" >> hosts
            fi
          done < domain.list

          echo "# AutoHosts End" >> hosts

      - name: 提交并推送更新
        run: |
          git config user.name "tee1975"
          git config user.email "tee1975@users.noreply.github.com"
          
          git add hosts
          git commit -m "auto update hosts $(date +'%Y-%m-%d %H:%M')"
          git push
